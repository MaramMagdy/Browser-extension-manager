<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <!-- <script src="node_modules/axios/dist/axios.min.js"></script> -->

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="control.js"></script>
    <script src="control.js"></script>

    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Browser extensions manager UI</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <!-- <style>
      .attribution { font-size: 11px; text-align: center; }
      .attribution a { color: hsl(228, 45%, 44%); }
    </style> -->
  </head>
  <body data-theme="light">
    <div class="container">
      <div class="navbar">
        <div class="menu-icon">
          <img
            class="logo-dark"
            src="assets/images/image-removebg-preview.png"
            alt=""
          />

          <span>Extentions</span>
        </div>
        <button class="sun" onclick="toggleTheme()">
          <img id="theme-toggle" src="assets/images/icon-moon.svg" alt="" />
        </button>
      </div>

      <div class="extension-list">
        <p>Extensions List</p>

        <div class="options">
          <input type="radio" name="filter" id="all" checked hidden />
          <label for="all" onclick="GetCards('all')">All</label>

          <input type="radio" name="filter" id="active" hidden />
          <label for="active" onclick="GetCards('active')">Active</label>

          <input type="radio" name="filter" id="inactive" hidden />
          <label for="inactive" onclick="GetCards('inactive')">Inactive</label>
        </div>
      </div>

      <div id="all-cards" class="all-cards"></div>
    </div>

    <!-- <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div> -->
  </body>
</html>
